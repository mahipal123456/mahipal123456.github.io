<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <!-- 🔴 Primary Redirect -->
  <meta http-equiv="refresh" content="0; url=https://texttohandwriting.tech/">

  <!-- 🔴 Canonical (tells Google new URL) -->
  <link rel="canonical" href="https://texttohandwriting.tech/">

  <!-- 🔴 JS Redirect (backup) -->


  <!-- 🔴 Prevent indexing of old page -->
  <meta name="robots" content="noindex, nofollow">

</head>

<body>
  <p>If you are not redirected, <a href="https://texttohandwriting.tech/">click here</a>.</p>
</body>
</html>
