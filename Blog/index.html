<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <!-- 🔴 Instant Redirect -->
  <meta http-equiv="refresh" content="0; url=https://texttohandwriting.tech/Blog/">

  <!-- 🔴 Canonical (points to new page) -->
  <link rel="canonical" href="https://texttohandwriting.tech/Blog/">

  <!-- 🔴 Prevent old page indexing -->
  <meta name="robots" content="noindex, nofollow">

  <!-- 🔴 JS Backup Redirect -->
  <script>
    window.location.replace("https://texttohandwriting.tech/Blog/");
  </script>

</head>

<body>
  <p>If you are not redirected, 
    <a href="https://texttohandwriting.tech/Blog/">click here</a>.
  </p>
</body>
</html>
